name: C Deploy Test

on:
 push:
 branches: [main]

jobs:
 deploy:
 runs-on: ubuntu-latest
 on:
  workflow_dispatch:
 steps:
 - name: 코드 가져오기
 uses: actions/checkout@v3

 - name: 서버로 C 파일 업로드
 uses: appleboy/scp-action@v0.1.4
 with:
 host: ${{ secrets.SERVER_HOST }}
 username: ${{ secrets.SERVER_USER }}
 key: ${{ secrets.SSH_KEY }}
 source: "hello.c"
 target: "/home/${{ secrets.SERVER_USER }}/test"

 - name: 서버에서 컴파일 및 실행
 uses: appleboy/ssh-action@v0.1.10
 with:
 host: ${{ secrets.SERVER_HOST }}
 username: ${{ secrets.SERVER_USER }}
 key: ${{ secrets.SSH_KEY }}
 script: |
 # test 폴더 생성
 mkdir -p ~/test
 cd ~/test

 # gcc 설치 (없을 경우)
 #sudo apt update
 #sudo apt install -y gcc

 # 컴파일
 gcc hello.c -o hello

 # 실행
 #./hello